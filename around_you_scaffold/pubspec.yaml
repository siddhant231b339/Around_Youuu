name: around_you
description: ARound You - Location-based AR social discovery
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1

  # Firebase
  firebase_core: ^3.4.0
  firebase_auth: ^5.1.2
  cloud_firestore: ^5.2.1

  # Supabase
  supabase_flutter: ^2.5.6

  # AR + Location + Media
  ar_flutter_plugin: ^0.9.1
  geolocator: ^12.0.0
  permission_handler: ^11.3.1
  image_picker: ^1.1.2

  # Utilities
  google_fonts: ^6.2.1
  flutter_dotenv: ^5.1.0
  uuid: ^4.4.2
  intl: ^0.19.0
  geoflutterfire2: ^2.3.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/models/
    - assets/images/